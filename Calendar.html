<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book your Service</title>
  <style>
    :root {
      --bg: #f9f2f2;
      --panel: #ffffff;
      --border: #e4d4d3;
      --accent: #d4001d;
      --accent-soft: #f7d7da;
      --text: #222222;
      --muted: #666666;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .header h1 {
      font-size: 1.8rem;
      margin: 0;
    }

    .months {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .months button {
      border: 1px solid var(--border);
      background: white;
      color: var(--text);
      padding: 6px 10px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .months button.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }

    .small-box span {
      display: block;
      width: 100%;
      height: 18px;
      background: linear-gradient(90deg, #fff 0%, #f0f0f0 100%);
      border-radius: 6px;
    }

    .calendar-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
    }

    .week-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .week-days div,
    .days-grid button {
      text-align: center;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--muted);
    }

    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .days-grid button {
      min-height: 90px;
      border: 1px solid transparent;
      border-radius: 14px;
      background: #f5f5f5;
      padding: 10px;
      cursor: pointer;
      text-align: left;
      position: relative;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease, background 0.25s ease;
      color: var(--muted);
    }

    .days-grid button:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 28px rgba(0, 0, 0, 0.12);
      border-color: rgba(0, 0, 0, 0.08);
      background: #f0f0f0;
    }

    .days-grid button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      background: #e49696;
      border-color: transparent;
      color: var(--muted);
    }

    .days-grid button.active {
      border-color: #d70808;
      box-shadow: 0 0 0 2px rgba(228, 150, 150, 0.35);
      background: #e49696;
      color: #000;
    }

    .days-grid button.active span,
    .days-grid button.active small {
      color: #000;
    }

    .days-grid button span {
      display: block;
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .days-grid button small {
      display: block;
      font-size: 0.74rem;
      color: var(--muted);
      margin-top: 8px;
    }
    .days-grid button.active small {
      color: #000;
    }

    .selected-date {
      margin-top: 16px;
      font-size: 0.95rem;
      color: var(--accent);
    }

    .form-panel {
      margin-top: 20px;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      background: #fff7f7;
    }

    .form-panel label {
      display: block;
      font-size: 0.95rem;
      margin-bottom: 10px;
    }

    .form-panel .section-label {
      margin-top: 12px;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .service-options {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .service-card {
      flex: 1;
      min-width: 120px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #ffffff;
      color: var(--text);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }
    .service-card:hover {
      border-color: var(--border);
      transform: translateY(-1px);
      background: #fff8f8;
    }
    .service-card.active {
      border: 2px solid var(--accent);
      background: #ffe6ec;
      box-shadow: 0 8px 18px rgba(212, 0, 29, 0.14);
      color: #000 !important;
    }
    .service-card.active .service-name,
    .service-card.active .service-icon {
      color: #000 !important;
    }
    .service-icon {
      font-size: 1.6rem;
      margin-bottom: 8px;
    }
    .service-name {
      font-size: 0.95rem;
      font-weight: 700;
    }

    .period-options {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .period-card {
      flex: 1;
      min-width: 120px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #ffffff;
      color: var(--text);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    .period-card:hover {
      border-color: var(--border);
      transform: translateY(-1px);
      background: #fff8f8;
    }

    .period-card.active {
      border: 2px solid var(--accent);
      background: #ffe6ec;
      box-shadow: 0 8px 18px rgba(212, 0, 29, 0.14);
      color: #000 !important;
    }

    .period-card:disabled {
      cursor: not-allowed;
      opacity: 0.5;
      transform: none;
      box-shadow: none;
    }

    .period-name {
      font-size: 0.95rem;
      font-weight: 700;
    }

    .period-icon {
      font-size: 1.6rem;
      margin-bottom: 8px;
    }

    .period-count {
      margin-top: 4px;
      font-size: 0.85rem;
      color: #4f4f4f;
    }

    .form-panel input,
    .form-panel select,
    .form-panel button[type="submit"] {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 0.95rem;
      margin-top: 6px;
      background: white;
    }

    .form-panel button[type="submit"] {
      background: var(--accent);
      color: white;
      border: none;
      margin-top: 16px;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }

    .form-panel button[type="submit"]:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .feedback {
      margin-top: 12px;
      font-size: 0.9rem;
      min-height: 1.2em;
    }

    .feedback.info {
      color: #2a2a2a;
    }

    .feedback.success {
      color: #116b32;
    }

    .feedback.error {
      color: #a30d0d;
    }

    .reservas {
      margin-top: 22px;
    }

    .reserva {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      padding: 14px;
      margin-bottom: 10px;
    }

    .reserva strong {
      color: var(--accent);
    }

    @media(max-width: 920px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .panel {
        min-height: auto;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <div>
        <h1>Reserve seu serviço</h1>
        <p><a href="/admin/">Abrir painel admin</a></p>
      </div>
      <div class="months" id="months"></div>
    </div>

    <div class="layout">
      <div class="calendar-panel">
        <div class="week-days">
          <div>SEG</div>
          <div>TER</div>
          <div>QUA</div>
          <div>QUI</div>
          <div>SEX</div>
          <div>SÁB</div>
          <div>DOM</div>
        </div>
        <div class="days-grid" id="daysGrid"></div>
        <div class="selected-date" id="selectedDate">Clique em um dia para escolher a data*</div>

        <div class="form-panel">
          <form id="reservaForm">
            <label>Nome
              <input type="text" id="nome" required />
            </label>
            <label class="section-label">Serviço</label>
            <div class="service-options">
              <button type="button" class="service-card" data-service="Professional Coaching">
                <span class="service-icon">🏎️</span>
                <span class="service-name">Professional Coaching</span>
              </button>
              <button type="button" class="service-card" data-service="Summer Camp">
                <span class="service-icon">🏁☀️</span>
                <span class="service-name">Summer Camp</span>
              </button>
              <button type="button" class="service-card" data-service="Trackside Support">
                <span class="service-icon">🔧</span>
                <span class="service-name">Trackside Support</span>
              </button>
            </div>
            <input type="hidden" id="servico" name="servico" required />
            <label>Data selecionada
              <input type="text" id="data" readonly placeholder="Selecione um dia acima" required />
            </label>
            <label class="section-label">Período</label>
            <div class="period-options" id="periodOptions">
              <button type="button" class="period-card" data-period="manha">
                <span class="period-icon">🌅</span>
                <span class="period-name">Manhã</span>
                <span class="period-count"></span>
              </button>
              <button type="button" class="period-card" data-period="tarde">
                <span class="period-icon">🌇</span>
                <span class="period-name">Tarde</span>
                <span class="period-count"></span>
              </button>
            </div>
            <input type="hidden" id="horario" name="horario" required />
            <label>Telefone ou e-mail
              <input type="text" id="contato" required />
            </label>
            <button type="submit">Enviar reserva</button>
            <p class="feedback info" id="formFeedback" aria-live="polite"></p>
            <p class="feedback info" id="loadFeedback" aria-live="polite"></p>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = '/api/reservas';
    const AVAILABILITY_API_URL = '/api/disponibilidade';
    const MAX_RESERVATIONS_PER_PERIOD = 4;

    const monthNames = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
    const bookingPeriods = [
      { value: 'manha', label: 'Manhã' },
      { value: 'tarde', label: 'Tarde' }
    ];

    const serviceDetails = {
      'Professional Coaching': { icon: '🏎️', label: 'Professional Coaching' },
      'Summer Camp': { icon: '🏁☀️', label: 'Summer Camp' },
      'Trackside Support': { icon: '🔧', label: 'Trackside Support' }
    };

    const state = {
      currentMonth: new Date().getMonth(),
      currentYear: new Date().getFullYear(),
      selectedDay: null,
      reservas: [],
      periodIndex: new Map(),
      blockedIndex: new Map(),
      isSubmitting: false
    };

    const monthsContainer = document.getElementById('months');
    const daysGrid = document.getElementById('daysGrid');
    const selectedDateText = document.getElementById('selectedDate');
    const dataInput = document.getElementById('data');
    const serviceInput = document.getElementById('servico');
    const periodInput = document.getElementById('horario');
    const form = document.getElementById('reservaForm');
    const formFeedback = document.getElementById('formFeedback');
    const loadFeedback = document.getElementById('loadFeedback');
    const submitButton = form.querySelector('button[type="submit"]');
    const serviceCards = document.querySelectorAll('.service-card');
    const periodCards = document.querySelectorAll('.period-card');

    function setFeedback(target, type, message) {
      target.className = `feedback ${type}`;
      target.textContent = message || '';
    }

    function rebuildPeriodIndex() {
      state.periodIndex.clear();
      state.reservas.forEach(reserva => {
        const key = `${reserva.data}|${reserva.periodo}`;
        const current = state.periodIndex.get(key) || 0;
        state.periodIndex.set(key, current + 1);
      });
    }

    function periodKey(date, period) {
      return `${date}|${period}`;
    }

    function rebuildBlockedIndex(entries) {
      state.blockedIndex.clear();
      entries.forEach(item => {
        if (!item || !item.data || !item.periodo) {
          return;
        }
        const key = periodKey(item.data, item.periodo);
        state.blockedIndex.set(key, true);
      });
    }

    function isBlocked(date, period) {
      return state.blockedIndex.has(periodKey(date, 'all')) || state.blockedIndex.has(periodKey(date, period));
    }

    function countPeriodReservations(date, period) {
      return state.periodIndex.get(periodKey(date, period)) || 0;
    }

    function isDayFullyBooked(date) {
      return (
        (countPeriodReservations(date, 'manha') >= MAX_RESERVATIONS_PER_PERIOD || isBlocked(date, 'manha')) &&
        (countPeriodReservations(date, 'tarde') >= MAX_RESERVATIONS_PER_PERIOD || isBlocked(date, 'tarde'))
      );
    }

    function getDaysInMonth(year, month) {
      return new Date(year, month + 1, 0).getDate();
    }

    function isValidDateString(date) {
      if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) {
        return false;
      }
      const [year, month, day] = date.split('-').map(Number);
      const parsed = new Date(Date.UTC(year, month - 1, day));
      return (
        parsed.getUTCFullYear() === year &&
        parsed.getUTCMonth() === month - 1 &&
        parsed.getUTCDate() === day
      );
    }

    async function readApiError(response, fallbackMessage) {
      try {
        const body = await response.json();
        const apiMessage = body && body.error && body.error.message;
        if (apiMessage) {
          return apiMessage;
        }
      } catch (error) {
        console.error('Falha ao parsear erro da API:', error);
      }
      return fallbackMessage;
    }

    async function loadReservas() {
      const response = await fetch(API_URL);
      if (!response.ok) {
        throw new Error(await readApiError(response, 'Nao foi possivel carregar as reservas.'));
      }
      const data = await response.json();
      return Array.isArray(data) ? data : [];
    }

    async function loadDisponibilidade() {
      const response = await fetch(AVAILABILITY_API_URL);
      if (!response.ok) {
        throw new Error(await readApiError(response, 'Nao foi possivel carregar disponibilidade.'));
      }
      const data = await response.json();
      return Array.isArray(data) ? data : [];
    }

    async function saveReserva(reserva) {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(reserva)
      });
      if (!response.ok) {
        throw new Error(await readApiError(response, 'Nao foi possivel salvar a reserva.'));
      }
      const result = await response.json();
      return result.reserva;
    }

    function updatePeriodOptions() {
      const date = dataInput.value;
      let selectedStillAvailable = false;

      periodCards.forEach(card => {
        const periodValue = card.dataset.period;
        const count = date ? countPeriodReservations(date, periodValue) : 0;
        const disabled = Boolean(date) && (count >= MAX_RESERVATIONS_PER_PERIOD || isBlocked(date, periodValue));
        const countLabel = card.querySelector('.period-count');

        if (countLabel) {
          countLabel.textContent = count === 0 ? '' : `${count}/${MAX_RESERVATIONS_PER_PERIOD}`;
        }

        card.disabled = disabled;

        if (periodInput.value === periodValue && !disabled) {
          selectedStillAvailable = true;
        }

        if (disabled) {
          card.classList.remove('active');
        }
      });

      if (!selectedStillAvailable) {
        periodInput.value = '';
      }
    }

    function getDayButtonContent(day, dateValue) {
      const isSelected = state.selectedDay === dateValue;
      const isFull = isDayFullyBooked(dateValue);
      let content = `<span>${day}</span>`;

      if (isSelected) {
        const service = serviceInput.value;
        const period = periodInput.value;
        if (service && serviceDetails[service]) {
          const details = serviceDetails[service];
          content += `<small>${details.icon} ${details.label}</small>`;
        }
        if (period) {
          const periodLabel = bookingPeriods.find(item => item.value === period)?.label || period;
          content += `<small>${periodLabel}</small>`;
        }
      } else {
        if (isFull) {
          content += '<small>indisponivel</small>';
        } else {
          content += '<small>clique para agendar</small>';
        }
      }

      return content;
    }

    function selectDay(dateValue) {
      state.selectedDay = dateValue;
      dataInput.value = dateValue;
      updatePeriodOptions();
      renderSelectedInfo();
      renderCalendar();
    }

    function renderCalendar() {
      daysGrid.innerHTML = '';
      const firstDay = new Date(state.currentYear, state.currentMonth, 1).getDay();
      const dayOffset = (firstDay + 6) % 7;
      const totalDays = getDaysInMonth(state.currentYear, state.currentMonth);
      const fragment = document.createDocumentFragment();

      for (let i = 0; i < dayOffset; i++) {
        fragment.appendChild(document.createElement('div'));
      }

      for (let day = 1; day <= totalDays; day++) {
        const button = document.createElement('button');
        button.type = 'button';
        const dateValue = `${state.currentYear}-${String(state.currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const isFull = isDayFullyBooked(dateValue);

        button.innerHTML = getDayButtonContent(day, dateValue);
        button.disabled = isFull;
        if (state.selectedDay === dateValue) {
          button.classList.add('active');
        }

        if (!isFull) {
          button.addEventListener('click', () => selectDay(dateValue));
        }
        fragment.appendChild(button);
      }

      daysGrid.appendChild(fragment);
    }

    function renderMonthButtons() {
      monthsContainer.innerHTML = '';
      monthNames.forEach((name, index) => {
        const button = document.createElement('button');
        button.textContent = name;
        button.className = index === state.currentMonth ? 'active' : '';
        button.addEventListener('click', () => {
          state.currentMonth = index;
          renderMonthButtons();
          renderCalendar();
        });
        monthsContainer.appendChild(button);
      });
    }

    function renderSelectedInfo() {
      if (!state.selectedDay) {
        selectedDateText.textContent = 'Clique em um dia para escolher a data*';
        return;
      }
      selectedDateText.textContent = `Data selecionada: ${state.selectedDay}`;
    }

    function validateReserva(reserva) {
      const errors = [];

      if (!reserva.nome || reserva.nome.length < 2 || reserva.nome.length > 120) {
        errors.push('Informe um nome valido (2-120 caracteres).');
      }
      if (!serviceDetails[reserva.servico]) {
        errors.push('Selecione um servico valido.');
      }
      if (!isValidDateString(reserva.data)) {
        errors.push('Selecione uma data valida no calendario.');
      }
      if (!bookingPeriods.some(item => item.value === reserva.periodo)) {
        errors.push('Escolha Manhã ou Tarde.');
      }
      if (!reserva.contato || reserva.contato.length < 4 || reserva.contato.length > 140) {
        errors.push('Informe um contato valido (4-140 caracteres).');
      }

      return errors;
    }

    function resetFormState() {
      form.reset();
      serviceInput.value = '';
      periodInput.value = '';
      dataInput.value = '';
      state.selectedDay = null;
      serviceCards.forEach(card => card.classList.remove('active'));
      periodCards.forEach(card => card.classList.remove('active'));
      renderSelectedInfo();
      renderCalendar();
      updatePeriodOptions();
    }

    async function handleSubmit(event) {
      event.preventDefault();
      if (state.isSubmitting) {
        return;
      }

      const reserva = {
        nome: document.getElementById('nome').value.trim(),
        servico: serviceInput.value,
        data: dataInput.value,
        periodo: periodInput.value,
        contato: document.getElementById('contato').value.trim()
      };

      const validationErrors = validateReserva(reserva);
      if (validationErrors.length > 0) {
        setFeedback(formFeedback, 'error', validationErrors[0]);
        return;
      }

      const existingCount = countPeriodReservations(reserva.data, reserva.periodo);
      if (existingCount >= MAX_RESERVATIONS_PER_PERIOD) {
        setFeedback(formFeedback, 'error', 'Este periodo ja atingiu o limite de vagas para esta data.');
        return;
      }

      if (isBlocked(reserva.data, reserva.periodo)) {
        setFeedback(formFeedback, 'error', 'Este periodo esta bloqueado pelo administrador.');
        return;
      }

      try {
        state.isSubmitting = true;
        submitButton.disabled = true;
        setFeedback(formFeedback, 'info', 'Salvando reserva...');

        const created = await saveReserva(reserva);
        state.reservas.push(created);
        rebuildPeriodIndex();
        resetFormState();
        setFeedback(formFeedback, 'success', 'Reserva registrada com sucesso!');
      } catch (error) {
        setFeedback(formFeedback, 'error', error.message || 'Falha ao salvar a reserva.');
      } finally {
        state.isSubmitting = false;
        submitButton.disabled = false;
      }
    }

    function bindEvents() {
      serviceCards.forEach(card => {
        card.addEventListener('click', () => {
          serviceCards.forEach(item => item.classList.remove('active'));
          card.classList.add('active');
          serviceInput.value = card.dataset.service;
          renderCalendar();
        });
      });

      periodCards.forEach(card => {
        card.addEventListener('click', () => {
          if (card.disabled) {
            return;
          }
          periodCards.forEach(item => item.classList.remove('active'));
          card.classList.add('active');
          periodInput.value = card.dataset.period;
          renderCalendar();
        });
      });

      form.addEventListener('submit', handleSubmit);
    }

    async function init() {
      setFeedback(loadFeedback, 'info', 'Carregando reservas...');

      try {
        const [reservas, disponibilidade] = await Promise.all([
          loadReservas(),
          loadDisponibilidade()
        ]);

        state.reservas = reservas;
        rebuildPeriodIndex();
        rebuildBlockedIndex(disponibilidade);
        renderMonthButtons();
        renderCalendar();
        renderSelectedInfo();
        updatePeriodOptions();
        setFeedback(loadFeedback, 'info', '');
      } catch (error) {
        renderMonthButtons();
        renderCalendar();
        renderSelectedInfo();
        updatePeriodOptions();
        setFeedback(loadFeedback, 'error', error.message || 'Erro ao carregar reservas.');
      }

      bindEvents();
    }

    init();
  </script>
</body>
</html>
