<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URACE | Driver Briefing</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { background: #101624; color: #fff; font-family: 'Sora', 'Trebuchet MS', sans-serif; margin: 0; }
    .site-topbar { height: 56px; display: flex; align-items: center; padding: 0 22px; border-bottom: 1px solid rgba(255,255,255,0.14); background: rgba(3,6,12,0.92); position: sticky; top: 0; z-index: 20; backdrop-filter: blur(6px); }
    .topbar-left, .topbar-right { display: flex; align-items: center; gap: 12px; }
    .menu-icon { color: #cad3ea; font-size: 1.05rem; font-weight: 700; }
    .topbar-logo { width: 112px; height: auto; display: block; }
    .topbar-link { color: #e6ebf8; font-size: 0.78rem; text-decoration: none; border: 1px solid rgba(255,255,255,0.3); border-radius: 999px; padding: 7px 14px; font-weight: 600; }
    .page {
      width: min(98vw, 900px);
      margin: 40px auto 0;
      padding: 0 22px 22px;
      position: relative;
      z-index: 2;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
      border: 1px solid #273353;
      background: #0f1a36;
      border-radius: 14px;
      padding: 14px 16px;
    }
    .header h1 {
      font-size: 1.2rem;
      margin: 0;
      font-weight: 800;
      letter-spacing: 0.01em;
      color: #f5f7ff;
    }
    .brand-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    .logo-mark {
      width: 190px;
      height: auto;
      flex: 0 0 auto;
      display: block;
    }
    .cards-row {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
      margin-top: 32px;
      justify-content: center;
      align-items: stretch;
    }
    .booking-card {
      background: linear-gradient(180deg, #181e2e 0%, #232c47 100%);
      border: 1px solid #c8d0e0;
      border-radius: 14px;
      padding: 28px 24px 24px 24px;
      box-shadow: 0 18px 34px rgba(2,8,26,0.26);
      min-width: 320px;
      max-width: 400px;
      flex: 1 1 340px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: stretch;
    }
    .booking-card-title {
      font-size: 1.05rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #fff;
      margin: 0 0 18px;
      padding-bottom: 10px;
      border-bottom: 1px solid #c4d0f0;
      text-align: center;
    }
    .booking-card label {
      display: flex;
      flex-direction: column;
      font-size: 1rem;
      margin-bottom: 16px;
      font-weight: 600;
      gap: 6px;
    }
    .booking-card input,
    .booking-card select,
    .booking-card textarea {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #c8d0e0;
      font-size: 1rem;
      margin-top: 0;
      background: #232c47;
      color: #fff;
      font-family: inherit;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      box-sizing: border-box;
    }
    .booking-card button[type="submit"] {
      background: #fff;
      color: #101624;
      border: none;
      margin-top: 18px;
      cursor: pointer;
      transition: opacity 0.2s ease, transform 0.2s ease;
      font-weight: 700;
      letter-spacing: 0.01em;
      border-radius: 10px;
      font-size: 1.05rem;
      padding: 14px 0;
    }
    .booking-card button[type="submit"]:hover {
      background: #15245a;
      color: #fff;
      transform: translateY(-1px);
    }
    .booking-card button[type="submit"]:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .feedback {
      margin-top: 12px;
      font-size: 0.98rem;
      min-height: 1.2em;
      text-align: center;
    }
    .feedback.info { color: #2a2a2a; }
    .feedback.success { color: #116b32; }
    .feedback.error { color: #ff2f3e; }
    @media(max-width: 900px) {
      .cards-row {
        flex-direction: column;
        gap: 22px;
        align-items: center;
      }
      .booking-card {
        min-width: 0;
        width: 100%;
        max-width: 480px;
      }
    }
    @media(max-width: 600px) {
      .booking-card {
        padding: 16px 6vw;
        min-width: 0;
        width: 100%;
        max-width: 98vw;
      }
      .cards-row {
        gap: 14px;
      }
    }
  </style>
</head>
<body>
  <header class="site-topbar">
    <div class="topbar-left">
      <span class="menu-icon">☰</span>
    </div>
    <svg class="topbar-logo" viewBox="0 0 740 170" role="img" aria-label="Logo URACE" xmlns="http://www.w3.org/2000/svg">
      <rect width="740" height="170" fill="none"/>
      <text x="8" y="125" font-family="Sora, sans-serif" font-size="124" font-weight="800" fill="#e1121b" letter-spacing="3">URACE</text>
      <circle cx="170" cy="78" r="22" fill="#1726f5"/>
    </svg>
    <div class="topbar-right">
      <a class="topbar-link" href="#">Voltar</a>
    </div>
  </header>
  <div class="page">
    <div class="header">
      <div class="brand-wrap">
        <svg class="logo-mark" viewBox="0 0 740 170" role="img" aria-label="Logo URACE" xmlns="http://www.w3.org/2000/svg">
          <rect width="740" height="170" fill="none"/>
          <text x="8" y="125" font-family="Sora, sans-serif" font-size="124" font-weight="800" fill="#e1121b" letter-spacing="3">URACE</text>
          <circle cx="170" cy="78" r="22" fill="#1726f5"/>
        </svg>
        <h1>Driver Briefing</h1>
      </div>
    </div>
    <form id="briefingForm">
      <div class="cards-row">
        <!-- CARD 2: Informações de contato -->
        <div class="booking-card">
          <h3 class="booking-card-title">Informações de contato</h3>
          <label>Pit ID
            <input type="text" id="pitId" required maxlength="24" placeholder="Ex.: PIT-AB12-XY34" />
          </label>
          <p class="feedback" id="pitIdFeedback" aria-live="polite"></p>
          <label>Data da reserva
            <input type="text" id="reservaData" readonly />
          </label>
          <label>Período da reserva
            <input type="text" id="reservaPeriodo" readonly />
          </label>
          <label>Serviço da reserva
            <input type="text" id="reservaServico" readonly />
          </label>
          <label>Nome do piloto
            <input type="text" id="nomePiloto" required />
          </label>
          <label>Nome do responsável
            <input type="text" id="responsavelPiloto" required />
          </label>
          <label>E-mail
            <input type="email" id="email" required maxlength="254" autocapitalize="off" autocomplete="email" inputmode="email" pattern="[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}" title="Informe um e-mail valido (ex.: nome@dominio.com)" />
          </label>
          <label>Telefone
            <input type="tel" id="telefone" required />
          </label>
        </div>
        <!-- CARD 3: Dados do driver -->
        <div class="booking-card">
          <h3 class="booking-card-title">Dados do driver</h3>
          <label>Idade do driver
            <input type="number" id="age" min="1" max="120" required />
          </label>
          <label>Altura do driver
            <input type="text" id="height" placeholder="Ex.: 1.72m" required />
          </label>
          <label>Peso do driver
            <input type="text" id="weight" placeholder="Ex.: 68kg" required />
          </label>
          <label>Cintura do driver
            <input type="text" id="waist" placeholder="Ex.: 78cm" required />
          </label>
          <label>Experiência no kart
            <select id="kartingExperience" required>
              <option value="">Selecione</option>
              <option value="Sim">Sim</option>
              <option value="Nao">Nao</option>
            </select>
          </label>
          <label id="experienceDescriptionField" style="display: none;">Descreva sua experiência
            <textarea id="experienceDescription" rows="3" maxlength="500" placeholder="Conte brevemente sua experiencia"></textarea>
          </label>
          <button type="submit">Enviar briefing</button>
          <p class="feedback info" id="formFeedback" aria-live="polite"></p>
        </div>
      </div>
    </form>
  </div>
  <script src="./runtime-config.js"></script>
  <script>
    const API_REQUEST_TIMEOUT_MS = 60000;
    const LOCAL_API_BASE_KEY = 'calendar_api_base';
    const CANONICAL_API_BASES = [
      'https://calendar-backend-w6wm.onrender.com'
    ];

    const state = {
      apiBase: '',
      selectedReserva: null,
      isSubmitting: false
    };

    const form = document.getElementById('briefingForm');
    const formFeedback = document.getElementById('formFeedback');
    const pitIdInput = document.getElementById('pitId');
    const pitIdFeedback = document.getElementById('pitIdFeedback');
    const reservaDataInput = document.getElementById('reservaData');
    const reservaPeriodoInput = document.getElementById('reservaPeriodo');
    const reservaServicoInput = document.getElementById('reservaServico');
    const nomePilotoInput = document.getElementById('nomePiloto');
    const responsavelInput = document.getElementById('responsavelPiloto');
    const emailInput = document.getElementById('email');
    const telefoneInput = document.getElementById('telefone');
    const ageInput = document.getElementById('age');
    const heightInput = document.getElementById('height');
    const weightInput = document.getElementById('weight');
    const waistInput = document.getElementById('waist');
    const kartingExperienceInput = document.getElementById('kartingExperience');
    const experienceDescriptionField = document.getElementById('experienceDescriptionField');
    const experienceDescriptionInput = document.getElementById('experienceDescription');

    function setFeedback(target, type, message) {
      target.className = `feedback ${type}`;
      target.textContent = message || '';
    }

    function normalizePitId(value) {
      return String(value || '')
        .trim()
        .toUpperCase()
        .replace(/\s+/g, '-')
        .replace(/[^A-Z0-9-_]/g, '');
    }

    function normalizeApiBase(value) {
      if (!value || typeof value !== 'string') {
        return '';
      }

      const trimmed = value.trim().replace(/\/$/, '');
      if (!trimmed) {
        return '';
      }

      if (!/^https?:\/\//i.test(trimmed)) {
        return '';
      }

      try {
        const parsed = new URL(trimmed);
        const hostname = (parsed.hostname || '').toLowerCase();
        const isLocalHost = hostname === 'localhost' || hostname === '127.0.0.1';
        if (isLocalHost) {
          return '';
        }
      } catch (error) {
        return '';
      }

      return trimmed;
    }

    function getConfiguredApiBase() {
      try {
        const params = new URLSearchParams(window.location.search || '');
        const paramApiBase = normalizeApiBase(params.get('apiBase') || '');
        if (paramApiBase) {
          localStorage.setItem(LOCAL_API_BASE_KEY, paramApiBase);
          return paramApiBase;
        }
      } catch (error) {
        console.error('Falha ao ler apiBase da URL:', error);
      }

      const windowApiBase = normalizeApiBase(window.CALENDAR_API_BASE || '');
      if (windowApiBase) {
        return windowApiBase;
      }

      try {
        const storedApiBase = normalizeApiBase(localStorage.getItem(LOCAL_API_BASE_KEY) || '');
        if (storedApiBase) {
          return storedApiBase;
        }
      } catch (error) {
        console.error('Falha ao ler apiBase salvo:', error);
      }

      return '';
    }

    function getApiCandidates() {
      const candidates = [];
      const configuredApiBase = getConfiguredApiBase();
      if (configuredApiBase) {
        candidates.push(configuredApiBase);
      }

      CANONICAL_API_BASES.forEach(base => {
        const normalized = normalizeApiBase(base);
        if (normalized) {
          candidates.push(normalized);
        }
      });

      return [...new Set(candidates)];
    }

    async function canReachApi(base) {
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 7000);
        const response = await fetch(`${base}/api/reservas`, {
          method: 'GET',
          signal: controller.signal
        });
        clearTimeout(timeoutId);
        return response && typeof response.status === 'number';
      } catch (error) {
        return false;
      }
    }

    async function resolveApiBase() {
      const candidates = getApiCandidates();
      for (const base of candidates) {
        const reachable = await canReachApi(base);
        if (reachable) {
          state.apiBase = base;
          return true;
        }
      }

      if (candidates.length > 0) {
        state.apiBase = candidates[0];
        return true;
      }

      state.apiBase = '';
      return false;
    }

    async function ensureApiBase(force = false) {
      if (state.apiBase && !force) {
        return true;
      }
      return await resolveApiBase();
    }

    async function fetchWithTimeout(url, options = {}, timeoutMs = API_REQUEST_TIMEOUT_MS) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), timeoutMs);

      try {
        return await fetch(url, {
          ...options,
          signal: controller.signal
        });
      } finally {
        clearTimeout(timeoutId);
      }
    }

    async function fetchWithApi(path, options) {
      const hasApi = await ensureApiBase(false);
      if (!hasApi) {
        throw new Error('API_UNAVAILABLE');
      }

      try {
        return await fetchWithTimeout(`${state.apiBase}${path}`, options);
      } catch (error) {
        if (error && error.name === 'TypeError') {
          const recovered = await ensureApiBase(true);
          if (!recovered) {
            throw new Error('API_UNAVAILABLE');
          }
          return await fetchWithTimeout(`${state.apiBase}${path}`, options);
        }
        if (error && error.name === 'AbortError') {
          throw new Error('API_REQUEST_TIMEOUT');
        }
        throw error;
      }
    }

    async function parseApiError(response, fallbackMessage) {
      try {
        const body = await response.json();
        if (body && body.error && Array.isArray(body.error.details) && body.error.details.length > 0) {
          return body.error.details[0];
        }
        if (body && body.error && body.error.message) {
          return body.error.message;
        }
      } catch (error) {
        console.error('Falha ao parsear erro da API:', error);
      }
      return fallbackMessage;
    }

    function formatDateBr(dateValue) {
      const match = String(dateValue || '').match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (!match) {
        return dateValue || '';
      }
      return `${match[3]}/${match[2]}/${match[1]}`;
    }

    function periodLabel(value) {
      if (value === 'manha') {
        return 'Manhã';
      }
      if (value === 'tarde') {
        return 'Tarde';
      }
      return value || '';
    }

    function clearReservationContext() {
      state.selectedReserva = null;
      reservaDataInput.value = '';
      reservaPeriodoInput.value = '';
      reservaServicoInput.value = '';
    }

    function applyReservationContext(reserva) {
      state.selectedReserva = reserva;
      reservaDataInput.value = formatDateBr(reserva.data || '');
      reservaPeriodoInput.value = periodLabel(reserva.periodo || '');
      reservaServicoInput.value = reserva.servico || '';

      if (!nomePilotoInput.value && (reserva.nomePiloto || reserva.nome)) {
        nomePilotoInput.value = reserva.nomePiloto || reserva.nome || '';
      }
      if (!responsavelInput.value && (reserva.responsavelPiloto || reserva.nomeResponsavel || reserva.responsavel)) {
        responsavelInput.value = reserva.responsavelPiloto || reserva.nomeResponsavel || reserva.responsavel || '';
      }
      if (!emailInput.value && reserva.email) {
        emailInput.value = reserva.email;
      }
      if (!telefoneInput.value && reserva.telefone) {
        telefoneInput.value = reserva.telefone;
      }
    }

    async function loadReservaByPitId(pitId) {
      const response = await fetchWithApi('/api/reservas');
      if (!response.ok) {
        throw new Error(await parseApiError(response, 'Nao foi possivel carregar reservas.'));
      }

      const reservas = await response.json();
      const normalized = normalizePitId(pitId);
      if (!Array.isArray(reservas)) {
        return null;
      }

      return reservas.find(item => normalizePitId(item && item.pitId) === normalized) || null;
    }

    async function tryUpdateBriefing(reservaId, payload) {
      const attempts = [
        { method: 'PATCH', path: `/api/reservas/pit/${encodeURIComponent(payload.pitId)}`, body: { ...payload, etapa: 2 } },
        { method: 'PATCH', path: `/api/reservas/${encodeURIComponent(reservaId)}` },
        { method: 'PUT', path: `/api/reservas/${encodeURIComponent(reservaId)}` },
        { method: 'POST', path: `/api/reservas/${encodeURIComponent(reservaId)}/briefing` },
        { method: 'PUT', path: `/api/reservas/${encodeURIComponent(reservaId)}/briefing` }
      ];

      let lastMessage = 'Falha ao atualizar briefing na API.';
      for (const attempt of attempts) {
        const response = await fetchWithApi(attempt.path, {
          method: attempt.method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(attempt.body || payload)
        });

        if (response.ok) {
          return true;
        }

        lastMessage = await parseApiError(response, lastMessage);
        if (response.status >= 500) {
          break;
        }
      }

      throw new Error(lastMessage);
    }

    function saveBriefingFallback(pitId, payload) {
      const key = 'calendar_briefing_cache';
      const cacheRaw = localStorage.getItem(key);
      const cache = cacheRaw ? JSON.parse(cacheRaw) : {};
      cache[pitId] = {
        ...payload,
        updatedAt: new Date().toISOString()
      };
      localStorage.setItem(key, JSON.stringify(cache));
    }

    async function onPitIdChange() {
      const normalized = normalizePitId(pitIdInput.value);
      pitIdInput.value = normalized;

      if (!normalized) {
        clearReservationContext();
        setFeedback(pitIdFeedback, 'error', 'Informe um Pit ID para buscar a reserva da Etapa 1.');
        return;
      }

      try {
        setFeedback(pitIdFeedback, 'info', 'Buscando dados da reserva...');
        const reserva = await loadReservaByPitId(normalized);
        if (!reserva) {
          clearReservationContext();
          setFeedback(pitIdFeedback, 'error', 'Pit ID nao encontrado. Verifique o codigo da Etapa 1.');
          return;
        }

        applyReservationContext(reserva);
        setFeedback(pitIdFeedback, 'success', 'Reserva localizada. Dados da Etapa 1 preenchidos automaticamente.');
      } catch (error) {
        clearReservationContext();
        setFeedback(pitIdFeedback, 'error', error.message || 'Falha ao buscar reserva por Pit ID.');
      }
    }

    async function handleSubmit(event) {
      event.preventDefault();
      if (state.isSubmitting) {
        return;
      }

      const pitId = normalizePitId(pitIdInput.value);
      pitIdInput.value = pitId;
      if (!pitId) {
        setFeedback(formFeedback, 'error', 'Informe um Pit ID valido antes de enviar.');
        return;
      }

      if (!state.selectedReserva || normalizePitId(state.selectedReserva.pitId) !== pitId) {
        setFeedback(formFeedback, 'error', 'Busque um Pit ID valido da Etapa 1 antes de enviar o briefing.');
        return;
      }

      const payload = {
        pitId,
        nomePiloto: nomePilotoInput.value.trim(),
        nome: nomePilotoInput.value.trim(),
        responsavelPiloto: responsavelInput.value.trim(),
        email: emailInput.value.trim(),
        telefone: telefoneInput.value.trim(),
        age: ageInput.value.trim(),
        height: heightInput.value.trim(),
        weight: weightInput.value.trim(),
        waist: waistInput.value.trim(),
        kartingExperience: kartingExperienceInput.value,
        experienceDescription: experienceDescriptionInput.value.trim(),
        bookingProgress: 100,
        bookingStageStatus: 'completa'
      };

      try {
        state.isSubmitting = true;
        setFeedback(formFeedback, 'info', 'Enviando briefing...');
        await tryUpdateBriefing(state.selectedReserva.id, payload);
        setFeedback(formFeedback, 'success', 'Briefing enviado e vinculado ao mesmo Pit ID com sucesso.');
      } catch (error) {
        saveBriefingFallback(pitId, payload);
        setFeedback(
          formFeedback,
          'info',
          'Briefing salvo localmente para este Pit ID. A API atual nao possui rota de atualizacao completa nesta etapa.'
        );
      } finally {
        state.isSubmitting = false;
      }
    }

    function toggleExperienceDescriptionField() {
      const shouldShow = (kartingExperienceInput.value || '') === 'Sim';
      experienceDescriptionField.style.display = shouldShow ? 'flex' : 'none';
      experienceDescriptionInput.required = shouldShow;
      if (!shouldShow) {
        experienceDescriptionInput.value = '';
      }
    }
    kartingExperienceInput.addEventListener('change', toggleExperienceDescriptionField);
    pitIdInput.addEventListener('blur', onPitIdChange);
    pitIdInput.addEventListener('change', onPitIdChange);
    form.addEventListener('submit', handleSubmit);
    toggleExperienceDescriptionField();

    (async () => {
      const hasApi = await ensureApiBase(false);
      if (!hasApi) {
        setFeedback(formFeedback, 'error', 'API indisponivel. Use ?apiBase=https://seu-backend para concluir o briefing.');
      }
    })();
  </script>
</body>
</html>
